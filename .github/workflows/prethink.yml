name: Prethink Context Generation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  prethink:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Workaround: Prethink generates calm-architecture.json and architecture.md
      # in one cycle but deletes them in a subsequent cycle. The Gradle plugin
      # then fails trying to delete files that were never written to disk.
      # See: https://github.com/moderneinc/rewrite-prethink/issues/XXX
      - name: Work around Prethink multi-cycle delete bug
        run: |
          mkdir -p .moderne/context
          touch .moderne/context/calm-architecture.json .moderne/context/architecture.md

      - name: Run Prethink (no AI) and custom recipe
        run: ./gradlew :app:rewriteRun

      - name: Verify generated context files
        run: |
          echo "=== Generated Prethink context files ==="
          find .moderne/context -type f 2>/dev/null || echo "No .moderne/context directory found"
          echo ""
          echo "=== Agent config files ==="
          for f in AGENTS.md CLAUDE.md .cursorrules .github/copilot-instructions.md; do
            if [ -f "$f" ]; then
              echo "Found: $f"
            fi
          done
          echo ""
          echo "=== Data tables ==="
          find build/reports/rewrite -type f 2>/dev/null || echo "No data tables exported"

      - name: Verify Mermaid architecture diagram
        run: |
          DIAGRAM=".moderne/context/architecture.md"
          if [ ! -s "$DIAGRAM" ]; then
            echo "ERROR: $DIAGRAM is missing or empty"
            exit 1
          fi
          if ! grep -qE '^(graph|flowchart) ' "$DIAGRAM"; then
            echo "ERROR: $DIAGRAM does not contain a Mermaid graph/flowchart directive"
            echo "--- contents ---"
            cat "$DIAGRAM"
            exit 1
          fi
          echo "Mermaid diagram verified:"
          cat "$DIAGRAM"
