name: Prethink Context Generation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  prethink:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Zulu)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Prethink (no AI) and custom recipe
        run: ./gradlew :app:rewriteRun

      - name: Verify generated context files
        run: |
          echo "=== Generated Prethink context files ==="
          find .moderne/context -type f 2>/dev/null || echo "No .moderne/context directory found"
          echo ""
          echo "=== Agent config files ==="
          for f in AGENTS.md CLAUDE.md .cursorrules .github/copilot-instructions.md; do
            if [ -f "$f" ]; then
              echo "Found: $f"
            fi
          done
          echo ""
          echo "=== Data tables ==="
          find build/reports/rewrite -type f 2>/dev/null || echo "No data tables exported"

      - name: Verify architecture context
        run: |
          DIAGRAM=".moderne/context/architecture.md"
          if [ ! -s "$DIAGRAM" ]; then
            echo "ERROR: $DIAGRAM is missing or empty"
            exit 1
          fi
          if ! grep -q '```mermaid' "$DIAGRAM"; then
            echo "ERROR: $DIAGRAM does not contain a Mermaid diagram"
            echo "--- contents ---"
            cat "$DIAGRAM"
            exit 1
          fi
          echo "Architecture context verified:"
          cat "$DIAGRAM"

      - name: Verify custom endpoints context
        run: |
          CSV=".moderne/context/custom-endpoints.csv"
          MD=".moderne/context/custom-endpoints.md"

          for f in "$CSV" "$MD"; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is missing or empty"
              exit 1
            fi
          done

          # Expected rows derived from app/src/main/resources/custom.properties
          expected_rows=(
            "HTTP method,Path,Service,Description"
            "POST,/api/v2/orders,OrderService,Submit a new order"
            "GET,/api/v2/orders/{orderId},OrderService,Retrieve order details by ID"
            "PUT,/api/v2/inventory/{sku},InventoryService,Update inventory stock level"
          )
          for row in "${expected_rows[@]}"; do
            if ! grep -Fxq "$row" "$CSV"; then
              echo "ERROR: $CSV is missing expected row: $row"
              echo "--- contents ---"
              cat "$CSV"
              exit 1
            fi
          done

          if ! grep -Fq "# Custom Endpoints" "$MD"; then
            echo "ERROR: $MD is missing the expected heading"
            cat "$MD"
            exit 1
          fi

          echo "Custom endpoints context verified:"
          cat "$CSV"
          echo ""
          cat "$MD"
